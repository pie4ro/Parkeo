<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Parking · Recuperar contraseña</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="card auth-card">
      <div class="brand"><span class="brand-mark">SP</span> Smart Parking</div>
      <h1>Recuperar contraseña</h1>
      <p class="auth-sub">Responde tu pregunta de seguridad para elegir una nueva contraseña.</p>

      <div id="alertBox" class="hidden"></div>

      <form id="stepEmailForm">
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" required placeholder="tucorreo@ejemplo.com" />
        </div>
        <button type="submit" class="btn-primary btn-block" id="stepEmailBtn">Continuar</button>
      </form>

      <form id="stepResetForm" class="hidden">
        <div class="field">
          <label id="questionLabel">Pregunta de seguridad</label>
          <p id="questionText" style="font-weight:600; margin-bottom: 0.9rem;"></p>
        </div>
        <div class="field">
          <label for="answer">Tu respuesta</label>
          <input type="text" id="answer" required />
        </div>
        <div class="field">
          <label for="newPassword">Nueva contraseña</label>
          <input type="password" id="newPassword" required minlength="6" placeholder="Mínimo 6 caracteres" />
        </div>
        <button type="submit" class="btn-primary btn-block" id="stepResetBtn">Restablecer contraseña</button>
      </form>

      <p class="auth-footer">¿Recordaste tu contraseña? <a href="login.html">Inicia sesión</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const alertBox = document.getElementById('alertBox');
    const stepEmailForm = document.getElementById('stepEmailForm');
    const stepResetForm = document.getElementById('stepResetForm');
    let currentEmail = '';

    stepEmailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(alertBox);
      const btn = document.getElementById('stepEmailBtn');
      btn.disabled = true; btn.textContent = 'Buscando…';
      try {
        currentEmail = document.getElementById('email').value;
        const data = await api('/auth/forgot-password/question', {
          method: 'POST', auth: false, body: { email: currentEmail },
        });
        document.getElementById('questionText').textContent = data.securityQuestion;
        stepEmailForm.classList.add('hidden');
        stepResetForm.classList.remove('hidden');
      } catch (err) {
        showAlert(alertBox, err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Continuar';
      }
    });

    stepResetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(alertBox);
      const btn = document.getElementById('stepResetBtn');
      btn.disabled = true; btn.textContent = 'Restableciendo…';
      try {
        await api('/auth/forgot-password/reset', {
          method: 'POST', auth: false,
          body: {
            email: currentEmail,
            securityAnswer: document.getElementById('answer').value,
            newPassword: document.getElementById('newPassword').value,
          },
        });
        showAlert(alertBox, 'Contraseña restablecida. Ya puedes iniciar sesión.', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 1400);
      } catch (err) {
        showAlert(alertBox, err.message);
        btn.disabled = false; btn.textContent = 'Restablecer contraseña';
      }
    });
  </script>
</body>
</html>
