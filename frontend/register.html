<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Parking · Crear cuenta</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="card auth-card">
      <div class="brand"><span class="brand-mark">SP</span> Smart Parking</div>
      <h1>Crea tu cuenta</h1>
      <p class="auth-sub">Al registrarte generamos automáticamente tu identificador RFID para el acceso físico al estacionamiento.</p>

      <div id="alertBox" class="hidden"></div>

      <form id="registerForm">
        <div class="field">
          <label for="name">Nombre completo</label>
          <input type="text" id="name" required placeholder="Yengle Pérez" />
        </div>
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" required placeholder="tucorreo@ejemplo.com" />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required minlength="6" placeholder="Mínimo 6 caracteres" />
        </div>
        <div class="field">
          <label for="securityQuestion">Pregunta de seguridad</label>
          <input type="text" id="securityQuestion" required placeholder="¿Cuál fue tu primera mascota?" />
        </div>
        <div class="field">
          <label for="securityAnswer">Respuesta de seguridad</label>
          <input type="text" id="securityAnswer" required placeholder="Usada solo para recuperar tu contraseña" />
        </div>
        <button type="submit" class="btn-primary btn-block" id="submitBtn">Crear cuenta</button>
      </form>

      <p class="auth-footer">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(alertBox);
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creando cuenta…';
      try {
        const data = await api('/auth/register', {
          method: 'POST',
          auth: false,
          body: {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            securityQuestion: document.getElementById('securityQuestion').value,
            securityAnswer: document.getElementById('securityAnswer').value,
          },
        });
        setToken(data.token);
        setUser(data.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert(alertBox, err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
